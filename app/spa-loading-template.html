<!-- SPA first-paint loader: mirrors Preloader.vue's first frame so the loader paints before JS (no blank). Vue swaps in the live counter on mount. Static = number frozen at 0. -->
<div
  aria-hidden="true"
  style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:flex-start;padding:2rem;margin:0;background:#131313;color:#ffffff;font-family:'Neue Haas Grotesk Display',system-ui,-apple-system,BlinkMacSystemFont,sans-serif;"
>
  <span class="text-medium" style="line-height:1;letter-spacing:-0.03em;">0</span>
</div>
